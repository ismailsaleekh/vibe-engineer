# Manual protected npm release workflow.
#
# No PR/push/tag path publishes. Publication requires workflow_dispatch plus the
# protected `npm-release` GitHub Environment. The publish script independently
# verifies GitHub/npm identities before invoking `npm publish`.

name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release check only; do not publish"
        required: true
        type: boolean
        default: true
      npm_user:
        description: "Expected npm username for identity verification"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release check and optional publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: npm-release
    env:
      GH_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.19.0"
          registry-url: "https://registry.npmjs.org"

      - name: Enable pnpm
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.local/share/pnpm
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure npm token when provided
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"

      - name: Release check (build, test, quality, pack, install smoke, generated starter proof)
        run: |
          if [ -n "${{ inputs.npm_user }}" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            pnpm release:check -- --require-npm-auth --expected-npm-user "${{ inputs.npm_user }}"
          else
            pnpm release:check
          fi

      - name: Publish public npm package graph
        if: ${{ inputs.dry_run == false }}
        env:
          VIBE_ENGINEER_RELEASE_APPROVED: "true"
        run: |
          args=(--pack-dir .vibe/release/check/pack --confirm-publish)
          if [ -n "${{ inputs.npm_user }}" ]; then
            args+=(--expected-npm-user "${{ inputs.npm_user }}")
          fi
          pnpm release:publish -- "${args[@]}"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-evidence-${{ github.run_id }}
          path: .vibe/release
          if-no-files-found: warn
          retention-days: 30
