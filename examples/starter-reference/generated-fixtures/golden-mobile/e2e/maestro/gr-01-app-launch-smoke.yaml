- launchApp:
    clearState: true
# The golden-records screen must become visible.
- assertVisible:
    id: "golden-records-screen"
# The seeded golden-record list container must render.
- assertVisible:
    id: "golden-record-list"
# The first seeded golden-record row must be visible.
- assertVisible:
    id: "golden-record-item-0"
