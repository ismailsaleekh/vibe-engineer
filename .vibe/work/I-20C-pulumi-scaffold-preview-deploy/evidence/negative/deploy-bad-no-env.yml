# N5 fixture: deploy workflow has workflow_dispatch but NO protected environment binding.
name: deploy-bad-no-env
on:
  workflow_dispatch:
    inputs:
      stack:
        type: choice
        options: [dev, prod]
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: |
          pulumi login
          pulumi stack select ${{ inputs.stack }}
          pulumi up --yes
